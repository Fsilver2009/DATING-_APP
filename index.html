<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💕</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff0f6;
    font-family: Arial;
}

/* Main card */
.card {
    width: 380px;
    background: white;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(255,105,180,0.25);
    text-align: center;
    position: relative;
}

/* Romantic question */
.question {
    font-size: 18px;
    color: #ff4da6;
    font-weight: bold;
    margin-bottom: 25px;
}

/* Buttons */
button {
    padding: 12px 20px;
    border: none;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    position: absolute;
}

/* YES button */
#yesBtn {
    background: #ff4da6;
    color: white;
    left: 80px;
    top: 150px;
}

/* NO button */
#noBtn {
    background: #ffb6c1;
    color: white;
    left: 200px;
    top: 150px;
}

/* Response text */
#response {
    margin-top: 120px;
    font-size: 18px;
    color: #444;
}
</style>
</head>

<body>

<div class="card">

<div class="question">
    Please Mr Man I miss you 😢💕 <br>
    can we hang out today?
</div>

<button id="yesBtn">YES 💖</button>
<button id="noBtn">NO 😌</button>

<div id="response"></div>

</div>

<script src="script.js"></script>

</body>
</html>
