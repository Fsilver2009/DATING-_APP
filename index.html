<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffe6f0, #fff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* CARD */
.card {
    width: 90%;
    max-width: 400px;
    background: white;
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(255,105,180,0.25);
    position: relative;
}

/* QUESTION */
h2 {
    font-size: 18px;
    color: #ff4da6;
    margin-bottom: 20px;
}

/* BUTTONS */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background: #ff4da6;
    color: white;
    margin-right: 10px;
}

#noBtn {
    background: #ffb6c1;
    color: white;
    position: absolute;
}

/* RESPONSE */
#response {
    margin-top: 20px;
    font-size: 18px;
    color: #444;
}

/* HEARTS */
.heart {
    position: absolute;
    color: #ff4da6;
    font-size: 20px;
    animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-150px); opacity: 0; }
}

/* MOBILE */
@media(max-width: 500px){
    h2 { font-size: 16px; }
}
</style>
</head>

<body>

<div class="card">

<h2>🥺 please mr man, i miss you 💔🥺 can we hangout today?</h2>

<button id="yesBtn">YES 💖</button>
<button id="noBtn">NO 😏</button>

<div id="response"></div>

</div>

<!-- ROMANTIC SOUND -->
<audio id="loveSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
// BUTTONS
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const response = document.getElementById("response");
const sound = document.getElementById("loveSound");

// MOVE NO BUTTON (ESCAPE MODE 😂)
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES CLICK 💖
yesBtn.addEventListener("click", () => {
    response.innerHTML = "Thank you hubby 💖😍";

    sound.play();

    // CREATE 3 HEARTS
    for (let i = 0; i < 3; i++) {
        createHeart();
    }
});

// NO CLICK 😭 (still escapes)
noBtn.addEventListener("click", () => {
    response.innerHTML = "no is not allowed 😏";

    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// HEART ANIMATION
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "80%";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 2000);
}
</script>

</body>
</html>
