<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love App 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #fff0f6, #ffe6f0);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.card {
    width: 90%;
    max-width: 380px;
    background: white;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(255,105,180,0.2);
    position: relative;
    overflow: hidden;
}

/* Question */
h2 {
    color: #ff4da6;
    font-size: 18px;
    margin-bottom: 20px;
}

/* Buttons */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
}

#yesBtn {
    background: #ff4da6;
    color: white;
    margin-right: 10px;
}

#noBtn {
    background: #ffb6c1;
    color: white;
}

/* Response */
#response {
    margin-top: 20px;
    font-size: 18px;
    min-height: 40px;
    color: #444;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: #ff4da6;
    font-size: 18px;
    animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-150px); opacity: 0; }
}

/* Mobile */
@media (max-width: 480px) {
    h2 { font-size: 16px; }
    button { width: 45%; }
}
</style>

</head>
<body>

<div class="card">

<h2>💖 please mr man i miss you 💔 can we hangout today?</h2>

<div>
    <button id="yesBtn">YES 💖</button>
    <button id="noBtn">NO 😌</button>
</div>

<div id="response"></div>

</div>

<script src="Fsilver_date.js"></script>

</body>
</html>
