<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffe6f0, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* main card */
.card {
    width: 90%;
    max-width: 380px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(255,105,180,0.25);
    position: relative;
}

/* message */
h2 {
    font-size: 18px;
    color: #ff4d94;
    margin-bottom: 20px;
}

/* buttons */
.btn {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin: 8px;
}

.yes {
    background: #ff4da6;
    color: white;
}

.no {
    background: #ffb6c1;
    color: white;
    position: absolute;
}

/* response */
#response {
    margin-top: 20px;
    font-size: 16px;
    color: #444;
}

/* hearts animation */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
    0% {transform: translateY(0); opacity:1;}
    100% {transform: translateY(-120px); opacity:0;}
}

/* mobile */
@media(max-width:500px){
    .card {width: 95%;}
}
</style>
</head>

<body>

<div class="card">

<h2>💗 Please Mr Man I miss you 🥺💔<br>can we hang out today?</h2>

<button class="btn yes" onclick="yesClick()">YES 💖</button>
<button class="btn no" id="noBtn" onmouseover="moveNo()">NO 😌</button>

<div id="response"></div>

</div>

<script src="script.js"></script>

</body>
</html>
