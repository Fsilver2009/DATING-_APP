<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ffe6f0,#ffffff);
    font-family: Arial;
    overflow:hidden;
}

.card{
    width:90%;
    max-width:380px;
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(255,105,180,0.25);
    text-align:center;
    position:relative;
}

.question{
    font-size:18px;
    margin-bottom:20px;
    color:#ff4d88;
    font-weight:bold;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

#yesBtn{
    background:#ff4d88;
    color:white;
    margin-right:10px;
}

#noBtn{
    background:#ffb6c1;
    color:white;
    position:relative;
}

#yesBtn:hover{
    transform:scale(1.05);
}

/* floating hearts */
.heart{
    position:absolute;
    font-size:20px;
    animation: floatUp 2s linear forwards;
}

@keyframes floatUp{
    0%{transform:translateY(0); opacity:1;}
    100%{transform:translateY(-150px); opacity:0;}
}

#response{
    margin-top:20px;
    font-size:18px;
    color:#444;
}
</style>
</head>

<body>

<div class="card">

    <div class="question">
        Please mr man 🥺💔 I miss you... can we hangout today?
    </div>

    <button id="yesBtn">YES 💖</button>
    <button id="noBtn">NO 😌</button>

    <div id="response"></div>

</div>

<audio id="romanticSound" src="https://www.fesliyanstudios.com/play-mp3/387" preload="auto"></audio>

<script src="Fsilver_date.js"></script>

</body>
</html>
